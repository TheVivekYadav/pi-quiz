server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Normalize trailing-slash URLs like /admin/ to /admin so Expo Router pages
  # generated as HTML files can be resolved cleanly on refresh.
  location ~ ^(.+)/$ {
    return 301 $scheme://$host$1$is_args$args;
  }

  location / {
    try_files $uri $uri.html $uri/index.html /index.html;
  }
}
