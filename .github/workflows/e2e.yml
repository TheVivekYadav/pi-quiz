name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Point both servers at the Docker-Compose stack
      E2E_API_URL: http://localhost:3001
      E2E_APP_URL: http://localhost:4000
      E2E_DB_URL: postgresql://pi_quiz:pi_quiz_password@localhost:5433/pi_quiz_e2e
      E2E_ADMIN_ROLL: ADMIN001
      E2E_USER_ROLL: TESTUSER001
      # Tell the Expo web build to target the E2E API
      EXPO_PUBLIC_API_BASE_URL: http://localhost:3001/api

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node setup ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            hmm/package-lock.json
            hmmm/package-lock.json
            e2e/package-lock.json

      # ── Start isolated Docker stack ──────────────────────────────────────────
      - name: Start E2E stack (Postgres + API)
        run: docker compose -f docker-compose.e2e.yml up -d --wait

      # ── Build the Expo web app ───────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: hmmm
        run: npm ci

      - name: Export Expo web build
        working-directory: hmmm
        run: npx expo export --platform web --output-dir dist
        env:
          EXPO_PUBLIC_API_BASE_URL: http://localhost:3001/api

      # ── Serve the web build on port 4000 ─────────────────────────────────────
      - name: Install serve
        run: npm install -g serve

      - name: Serve web build
        working-directory: hmmm
        run: serve dist -l 4000 --no-clipboard &

      - name: Wait for web server to be ready
        run: npx wait-on http://localhost:4000 --timeout 60000

      # ── Install Playwright ────────────────────────────────────────────────────
      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # ── Run tests ─────────────────────────────────────────────────────────────
      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test
        env:
          CI: true
          E2E_API_URL: ${{ env.E2E_API_URL }}
          E2E_APP_URL: ${{ env.E2E_APP_URL }}
          E2E_DB_URL: ${{ env.E2E_DB_URL }}
          E2E_ADMIN_ROLL: ${{ env.E2E_ADMIN_ROLL }}
          E2E_USER_ROLL: ${{ env.E2E_USER_ROLL }}

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 7

      # ── Teardown ──────────────────────────────────────────────────────────────
      - name: Stop E2E stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
