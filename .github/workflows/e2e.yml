name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      BASE_URL: http://localhost:80
      TEST_USER_ROLL: TEST001
      TEST_ADMIN_ROLL: ADMIN001

    steps:
      - uses: actions/checkout@v4

      # ── Start the full stack ────────────────────────────────────────────────
      - name: Create external Docker network
        run: docker network create shared-net || true

      - name: Copy backend env
        run: cp hmm/.env.example hmm/.env

      - name: Start Docker Compose stack
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/auth/me > /dev/null 2>&1; then
              echo "API is up"; break
            fi
            echo "Waiting for API... ($i/30)"; sleep 3
          done

      # ── Set up Node / Playwright ────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests-e2e/package-lock.json

      - name: Install E2E dependencies
        run: npm ci
        working-directory: tests-e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests-e2e

      # ── Run tests ───────────────────────────────────────────────────────────
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: tests-e2e

      # ── Upload artifacts ────────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests-e2e/playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: tests-e2e/test-results/
          retention-days: 7
