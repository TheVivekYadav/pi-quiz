version: "3.9"

# E2E-isolated stack. Uses a separate Postgres DB (pi_quiz_e2e) and separate ports
# so it never conflicts with the dev/production stack.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up -d
#   (runs globalSetup / Playwright tests)
#   docker compose -f docker-compose.e2e.yml down -v

services:
  postgres-e2e:
    image: postgres:16-alpine
    container_name: pi-quiz-postgres-e2e
    environment:
      POSTGRES_DB: pi_quiz_e2e
      POSTGRES_USER: pi_quiz
      POSTGRES_PASSWORD: pi_quiz_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pi_quiz -d pi_quiz_e2e"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api-e2e:
    build:
      context: ./hmm
      dockerfile: Dockerfile
    container_name: pi-quiz-api-e2e
    environment:
      PORT: 3001
      NODE_ENV: test
      DATABASE_URL: postgresql://pi_quiz:pi_quiz_password@postgres-e2e:5432/pi_quiz_e2e
      DB_POOL_MAX: 10
      DB_IDLE_TIMEOUT_MS: 10000
      CORS_ORIGIN: http://localhost:4000
      MAX_ACTIVE_DEVICES: 10
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      postgres-e2e:
        condition: service_healthy
